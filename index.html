<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Natação — Sistema de Atletas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --navy:#0B2545; --navy-deep:#071A33; --navy-light:#173A66;
  --turq:#0FBFB3; --turq-dark:#0A8F86; --turq-tint:#E6FBF9;
  --white:#FFFFFF; --gray-lt:#F4F6F9; --gray-mid:#E3E8EF; --gray-brd:#D9E0E8;
  --text:#0F1B2D; --muted:#5B6B7E;
  --gold:#C89B1C; --gold-bg:#FFF6DD; --gold-brd:#F0DFA6;
  --ouro:#D4A017; --prata:#9AA5B1; --bronze:#B5651D;
  --radius:14px;
  --shadow:0 2px 10px rgba(15,27,45,.06);
  --shadow-lg:0 12px 32px rgba(15,27,45,.10);
}
html[data-theme="dark"]{
  --navy:#0B2545; --navy-deep:#050E1C; --navy-light:#173A66;
  --turq:#1BD8CA; --turq-dark:#12A99C; --turq-tint:#082B29;
  --white:#0E1826; --gray-lt:#0A1420; --gray-mid:#152238; --gray-brd:#20304A;
  --text:#EAF2F7; --muted:#8CA0B3;
  --gold:#FFD966; --gold-bg:#2A2308; --gold-brd:#4A3D10;
  --shadow:0 2px 10px rgba(0,0,0,.3); --shadow-lg:0 16px 40px rgba(0,0,0,.5);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--gray-lt);color:var(--text);font-family:'Inter',sans-serif;transition:background .2s,color .2s;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4,.brand,.stat-num{font-family:'Manrope',sans-serif;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
.wrap{max-width:1220px;margin:0 auto;padding:0 22px;}
img{max-width:100%;display:block;}
::selection{background:var(--turq);color:#fff;}

/* ---------------- TOPNAV ---------------- */
.topnav{position:sticky;top:0;z-index:60;background:var(--navy);box-shadow:0 1px 0 rgba(255,255,255,.06);}
.topnav-inner{max-width:1220px;margin:0 auto;padding:0 22px;display:flex;align-items:center;gap:22px;height:64px;}
.logo-mini{width:38px;height:38px;border-radius:50%;flex:none;overflow:hidden;border:2px solid var(--turq);background:#fff;}
.logo-mini img{width:100%;height:100%;object-fit:cover;}
.brandname{font-weight:800;font-size:15px;color:#fff;letter-spacing:.2px;white-space:nowrap;}
.brandname span{color:var(--turq);}
.navlinks{display:flex;gap:2px;margin-left:10px;flex:1;overflow-x:auto;scrollbar-width:none;}
.navlinks::-webkit-scrollbar{display:none;}
.navlink{padding:9px 13px;border-radius:9px;color:#AEC0D4;font-size:13.5px;font-weight:600;white-space:nowrap;transition:.12s;}
.navlink:hover{color:#fff;background:rgba(255,255,255,.06);}
.navlink.active{color:var(--navy);background:var(--turq);}
.navright{display:flex;align-items:center;gap:10px;}
.themebtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#fff;
  width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex:none;}
.navburger{display:none;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#fff;
  width:36px;height:36px;border-radius:9px;font-size:16px;flex:none;}
@media(max-width:940px){
  .navlinks{display:none;position:absolute;top:64px;left:0;right:0;background:var(--navy);flex-direction:column;padding:8px;box-shadow:var(--shadow-lg);}
  .navlinks.open{display:flex;}
  .navburger{display:flex;align-items:center;justify-content:center;}
}

/* ---------------- GENERIC ---------------- */
.section-title{font-size:20px;font-weight:800;margin:36px 0 16px;display:flex;align-items:center;gap:10px;}
.section-title .bar{width:5px;height:20px;border-radius:3px;background:linear-gradient(180deg,var(--turq),var(--navy-light));}
.section-sub{color:var(--muted);font-size:13.5px;margin:-10px 0 18px;}
.pagehead{padding:34px 0 6px;}
.pagehead h1{margin:0 0 6px;font-size:28px;font-weight:800;}
.pagehead p{margin:0;color:var(--muted);font-size:14px;}
.card{background:var(--white);border:1px solid var(--gray-brd);border-radius:var(--radius);box-shadow:var(--shadow);}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:700;border:none;}
.btn-primary{background:var(--turq);color:#04302C;}
.btn-ghost{background:transparent;border:1px solid var(--gray-brd);color:var(--text);}
.pill{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--gray-brd);color:var(--muted);background:var(--gray-lt);}
.badge-rec{font-size:10px;background:var(--gold);color:#402d00;padding:2px 7px;border-radius:6px;font-weight:800;letter-spacing:.02em;}
footer{text-align:center;color:var(--muted);font-size:12px;padding:50px 0 30px;border-top:1px solid var(--gray-brd);margin-top:60px;}

/* ---------------- HOME ---------------- */
.hero-banner{position:relative;min-height:400px;display:flex;align-items:center;overflow:hidden;background:var(--navy);}
.hero-banner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 22%;opacity:.42;}
.hero-scrim{position:absolute;inset:0;background:linear-gradient(100deg,var(--navy) 30%,rgba(11,37,69,.35) 85%);}
.hero-content{position:relative;z-index:2;padding:70px 0;}
.hero-eyebrow{color:var(--turq);font-size:12.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;}
.hero-content h1{color:#fff;font-size:40px;font-weight:800;margin:0 0 14px;max-width:640px;line-height:1.15;}
.hero-content p{color:#CBDCE6;font-size:15px;max-width:520px;margin:0 0 24px;line-height:1.6;}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;}

.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:16px;}
.statcard{background:var(--white);border:1px solid var(--gray-brd);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.statcard .stat-num{font-size:26px;font-weight:800;color:var(--navy);}
html[data-theme="dark"] .statcard .stat-num{color:var(--turq);}
.statcard .stat-label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}

.gridcols2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;}
.gridcols3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:860px){.gridcols2,.gridcols3{grid-template-columns:1fr;}}

.chartbox{background:var(--white);border:1px solid var(--gray-brd);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.chartbox h3{margin:0 0 12px;font-size:14.5px;}
.chartbox canvas{max-height:260px;}

.staffgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.staffcard{background:var(--white);border:1px solid var(--gray-brd);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.staffcard .role{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--turq-dark);font-weight:800;}
.staffcard h3{margin:4px 0 10px;font-size:19px;}
.staffcard ul{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:6px;}
.staffcard li{font-size:13.5px;color:var(--muted);}
.staffcard li b{color:var(--text);font-weight:600;}
.podium-photo{width:100%;border-radius:12px;margin-top:12px;}

.timeline{display:flex;flex-direction:column;gap:14px;margin-top:16px;}
.tl-item{background:var(--white);border:1px solid var(--gray-brd);border-left:3px solid var(--turq);
  border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);}
.tl-item.gold{border-left-color:var(--gold);}
.tl-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;}
.tl-head h4{margin:0;font-size:15px;}
.tl-date{font-size:12px;color:var(--muted);}
.tl-body{font-size:13.5px;color:var(--muted);margin-top:8px;line-height:1.6;}
.tl-body b{color:var(--text);}
.recordpills{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.recordpill{font-size:11.5px;background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-brd);
  padding:4px 10px;border-radius:20px;font-weight:700;}
html[data-theme="light"] .recordpill{color:#8a6d00;}

.emptystate{background:var(--white);border:1px dashed var(--gray-brd);border-radius:var(--radius);
  padding:34px;text-align:center;color:var(--muted);font-size:13.5px;}

/* ---------------- FILTER BAR ---------------- */
.filterbar{background:var(--white);border:1px solid var(--gray-brd);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.filterbar .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
.field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:130px;}
.field label{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;}
.field input[type=text],.field select{
  background:var(--gray-lt);border:1px solid var(--gray-brd);color:var(--text);
  border-radius:9px;padding:10px 12px;font-size:13.5px;font-family:inherit;}
.field input[type=text]:focus,.field select:focus{outline:none;border-color:var(--turq);}
.field.grow{flex:2;min-width:200px;}
.togglewrap{display:flex;align-items:center;gap:8px;padding:10px 4px;}
.togglewrap input{accent-color:var(--gold);width:16px;height:16px;}
.togglewrap label{font-size:12.5px;color:var(--muted);}
.btn-clear{background:transparent;border:1px solid var(--gray-brd);color:var(--muted);
  padding:10px 16px;border-radius:9px;font-size:13px;white-space:nowrap;}
.btn-clear:hover{border-color:var(--turq);color:var(--turq-dark);}
.resultcount{margin-top:12px;font-size:12.5px;color:var(--muted);}
.resultcount b{color:var(--turq-dark);}

/* ---------------- CARDS (athletes) ---------------- */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;}
.acard{background:var(--white);border:1px solid var(--gray-brd);border-radius:var(--radius);padding:16px;cursor:pointer;
  transition:.15s;box-shadow:var(--shadow);}
.acard:hover{border-color:var(--turq);transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.acard-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.avatar{width:46px;height:46px;border-radius:50%;flex:none;
  background:linear-gradient(135deg,var(--navy-light),var(--turq));
  display:flex;align-items:center;justify-content:center;padding:2px;}
.avatar span{width:100%;height:100%;border-radius:50%;background:var(--white);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--navy);}
html[data-theme="dark"] .avatar span{color:var(--turq);}
.acard-name{font-weight:700;font-size:14.5px;line-height:1.2;}
.acard-meta{font-size:11.5px;color:var(--muted);margin-top:2px;}
.medals-row{display:flex;gap:8px;font-size:12px;color:var(--muted);margin:8px 0 10px;}
.medals-row b{color:var(--text);}
.eventchips{display:flex;flex-wrap:wrap;gap:6px;}
.eventchip{font-size:10.5px;padding:4px 8px;border-radius:8px;background:var(--turq-tint);
  color:var(--turq-dark);border:1px solid var(--gray-brd);}
.eventchip.rec{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-brd);}
html[data-theme="light"] .eventchip.rec{color:#8a6d00;}

/* ---------------- TABLE ---------------- */
.tablewrap{background:var(--white);border:1px solid var(--gray-brd);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.tablehead{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--gray-brd);flex-wrap:wrap;gap:8px;}
.tablehead h3{margin:0;font-size:14.5px;}
.linkback{font-size:12px;color:var(--turq-dark);background:none;border:none;font-family:inherit;font-weight:700;}
table{width:100%;border-collapse:collapse;font-size:12.8px;}
thead th{position:sticky;top:0;background:var(--gray-lt);text-align:left;padding:10px 14px;
  font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--gray-brd);cursor:pointer;user-select:none;}
thead th:hover{color:var(--turq-dark);}
tbody td{padding:9px 14px;border-bottom:1px solid var(--gray-brd);}
tbody tr:hover{background:var(--turq-tint);}
tbody tr.record{background:var(--gold-bg);}
tbody tr.record td:first-child{box-shadow:inset 3px 0 0 var(--gold);}
.badge-place{font-weight:800;}
.badge-place.g{color:var(--gold);}
.pos-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;
  background:var(--gray-lt);font-weight:800;font-size:11.5px;}
.pos-num.p1{background:var(--ouro);color:#402d00;}
.pos-num.p2{background:var(--prata);color:#26313c;}
.pos-num.p3{background:var(--bronze);color:#fff;}
.rowlink{color:var(--turq-dark);font-weight:700;cursor:pointer;}

/* ---------------- ATHLETE PROFILE ---------------- */
.profile-head{display:flex;gap:22px;align-items:center;flex-wrap:wrap;padding:30px 0;}
.profile-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--navy-light),var(--turq));
  display:flex;align-items:center;justify-content:center;flex:none;padding:3px;}
.profile-avatar span{width:100%;height:100%;border-radius:50%;background:var(--white);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:32px;color:var(--navy);}
html[data-theme="dark"] .profile-avatar span{color:var(--turq);}
.profile-info h1{margin:0 0 6px;font-size:26px;}
.profile-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.profile-back{font-size:12.5px;color:var(--turq-dark);font-weight:700;display:inline-flex;align-items:center;gap:6px;margin-bottom:6px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin:18px 0;}
.kpi{background:var(--white);border:1px solid var(--gray-brd);border-radius:12px;padding:14px;text-align:center;box-shadow:var(--shadow);}
.kpi .n{font-size:22px;font-weight:800;color:var(--navy);}
html[data-theme="dark"] .kpi .n{color:var(--turq);}
.kpi .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.spec-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.evo-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.evo-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.evo-tab{font-size:11.5px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--gray-brd);color:var(--muted);background:var(--gray-lt);cursor:pointer;transition:background .15s,color .15s,border-color .15s;}
.evo-tab:hover{border-color:var(--turq-dark);color:var(--text);}
.evo-tab.active{background:var(--turq);border-color:var(--turq);color:#04211E;}
.evo-sub{font-size:11.5px;color:var(--muted);margin:-6px 0 10px;}
.bio-text{color:var(--muted);font-size:13.5px;line-height:1.7;}
.best-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:12px;}
.best-item{background:var(--white);border:1px solid var(--gray-brd);border-radius:12px;padding:14px;box-shadow:var(--shadow);}
.best-item .ev{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.best-item .tm{font-size:20px;font-weight:800;margin-top:4px;}
.best-item.rec{border-color:var(--gold-brd);background:var(--gold-bg);}

/* ---------------- GALLERY ---------------- */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.gphoto{border-radius:var(--radius);overflow:hidden;position:relative;box-shadow:var(--shadow);aspect-ratio:4/5;}
.gphoto img{width:100%;height:100%;object-fit:cover;}
.gphoto .cap{position:absolute;left:0;right:0;bottom:0;padding:14px;background:linear-gradient(0deg,rgba(7,26,51,.85),transparent);color:#fff;font-size:12.5px;font-weight:600;}

/* ---------------- CONTACT ---------------- */
.contact-box{background:linear-gradient(135deg,var(--navy),var(--navy-light));
  border-radius:var(--radius);padding:26px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
.contact-box h3{margin:0 0 6px;font-size:19px;}
.contact-box p{margin:0;color:#CFE0EA;font-size:13.5px;}
.contact-btns{display:flex;gap:10px;flex-wrap:wrap;}
.cbtn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;
  font-size:13.5px;font-weight:700;}
.cbtn.wa{background:#25D366;color:#04210F;}
.cbtn.ig{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.4);}
.schedule-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:16px;}
.day-card{background:var(--white);border:1px solid var(--gray-brd);border-radius:12px;padding:14px;box-shadow:var(--shadow);}
.day-card h4{margin:0 0 10px;font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--turq-dark);}
.day-time{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;margin-bottom:6px;}
.novo{font-size:9px;background:#F79A1E;color:#3a1e00;padding:1px 6px;border-radius:5px;font-weight:800;}

@media(max-width:720px){
  .staffgrid,.gridcols3{grid-template-columns:1fr;}
  .field{min-width:100%;}
  .hero-content h1{font-size:28px;}
}

/* ---------------- COMPETITIONS ---------------- */
.comp-card{padding:18px 20px;}
.comp-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.comp-head h3{margin:0;font-size:15.5px;}
.comp-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:12.5px;color:var(--muted);}

/* ---------------- RECORDS ---------------- */
.record-card{padding:20px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#FFFDF7 0%,#FFF3D2 55%,#FBE6A6 100%);
  border:1px solid var(--gold-brd);
  box-shadow:0 6px 18px rgba(200,155,28,.16), var(--shadow);}
.record-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--gold),#F5DD8E,var(--gold));}
html[data-theme="dark"] .record-card{
  background:linear-gradient(135deg,#111a28 0%,#171f2e 55%,#231d10 100%);
  border-color:#3A2E12;
  box-shadow:0 4px 14px rgba(0,0,0,.3);}
html[data-theme="dark"] .record-card::before{
  background:linear-gradient(90deg, rgba(255,217,102,.5), rgba(245,221,142,.7), rgba(255,217,102,.5));}
.record-card .rc-badge{position:absolute;top:14px;right:14px;background:var(--gold);color:#3A2A00;border:1px solid rgba(0,0,0,.08);
  font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.3px;box-shadow:0 2px 6px rgba(0,0,0,.14);}
html[data-theme="dark"] .record-card .rc-badge{background:rgba(255,217,102,.85);color:#2A2308;box-shadow:none;}
.record-card h3{margin:0 0 6px;font-size:15px;}
.record-card .rc-time{font-size:26px;font-weight:800;font-family:'Manrope',sans-serif;color:var(--navy);margin-bottom:8px;}
html[data-theme="dark"] .record-card .rc-time{color:var(--turq);}
.record-card .rc-athlete{font-size:13.5px;font-weight:700;margin-bottom:4px;}
.record-card .rc-meta{font-size:11.5px;color:var(--muted);}

/* ---------------- MISC ---------------- */
.mini-chip{display:inline-block;padding:2px 8px;border-radius:20px;background:var(--gray-mid);font-size:11px;font-weight:600;}
.empty-state{background:var(--white);border:1px dashed var(--gray-brd);border-radius:var(--radius);padding:30px;text-align:center;color:var(--muted);}
.empty-state p{margin:4px 0;}
.muted-small{font-size:12px;color:var(--muted);}

/* ---------------- SORTABLE TABLE HEADERS ---------------- */
th.sortable-th{cursor:pointer;user-select:none;position:relative;white-space:nowrap;transition:color .12s;}
th.sortable-th:hover{color:var(--turq-dark);}
html[data-theme="dark"] th.sortable-th:hover{color:var(--turq);}
th.sortable-th::after{content:'⇅';font-size:10px;opacity:.35;margin-left:5px;}
th.sortable-th.sort-asc::after{content:'↑';opacity:1;color:var(--turq-dark);}
th.sortable-th.sort-desc::after{content:'↓';opacity:1;color:var(--turq-dark);}
html[data-theme="dark"] th.sortable-th.sort-asc::after,
html[data-theme="dark"] th.sortable-th.sort-desc::after{color:var(--turq);}
.sortctl{display:flex;align-items:center;gap:8px;margin:-10px 0 18px;}
.sortctl label{font-size:12.5px;color:var(--muted);font-weight:600;}
.sortctl select{padding:6px 10px;border-radius:8px;border:1px solid var(--gray-brd);background:var(--white);color:var(--text);font-size:13px;}
.sortctl button{padding:6px 10px;border-radius:8px;border:1px solid var(--gray-brd);background:var(--white);color:var(--text);font-size:13px;}


/* ---------------- CORPO TECNICO (unified staff card) ---------------- */
.staffcard-duo{display:flex;gap:24px;padding:22px;align-items:flex-start;}
.staffcard-duo .staffduo-photo{width:200px;flex:0 0 200px;height:auto;border-radius:12px;display:block;}
.staffduo-body{flex:1;min-width:0;}
.staffduo-intro{margin:0 0 18px;font-size:13.5px;color:var(--muted);line-height:1.55;}
.staffduo-intro b{color:var(--text);font-weight:700;}
.staffduo-highlight{background:var(--gray-lt);border-radius:12px;padding:16px 18px;}
.staffduo-highlight .role{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--turq-dark);font-weight:800;}
.staffduo-highlight h3{margin:4px 0 10px;font-size:18px;}
.staffduo-highlight ul{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:6px;}
.staffduo-highlight li{font-size:13.5px;color:var(--muted);}
.staffduo-highlight li b{color:var(--text);font-weight:600;}
@media(max-width:720px){.staffcard-duo{flex-direction:column;align-items:center;text-align:left;}
  .staffcard-duo .staffduo-photo{width:100%;max-width:260px;height:auto;}}

/* ---------------- DESTAQUES DM (style leaderboards) ---------------- */
.style-hl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;}
.stylecard h3{margin:0 0 10px;font-size:14.5px;}
.style-lb-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray-mid);font-size:13px;}
.style-lb-row:last-child{border-bottom:none;}
.style-lb-name{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.style-lb-time{font-weight:700;font-family:'Manrope',sans-serif;font-size:12.5px;color:var(--muted);}

/* ---------------- INSTAGRAM CAROUSEL ---------------- */
.ig-carousel{overflow:hidden;position:relative;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent);
  mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent);}
.ig-track{display:flex;gap:16px;width:max-content;animation:ig-scroll 18s linear infinite;}
.ig-carousel:hover .ig-track{animation-play-state:paused;}
.ig-card{display:flex;align-items:center;gap:14px;width:320px;flex:0 0 auto;background:var(--white);
  border:1px solid var(--gray-brd);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);
  transition:transform .15s,box-shadow .15s,border-color .15s;}
.ig-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--turq);}
.ig-card-photo{width:60px;height:60px;border-radius:50%;object-fit:cover;flex:0 0 auto;border:2px solid var(--turq-tint);}
.ig-card-body{min-width:0;}
.ig-card-head{display:flex;align-items:center;gap:6px;font-size:13.5px;margin-bottom:2px;color:var(--text);}
.ig-card-head .ig-svg{color:#C1387D;flex:0 0 auto;}
.ig-card-body p{margin:0 0 4px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ig-card-cta{font-size:12px;font-weight:700;color:var(--turq-dark);}
@keyframes ig-scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.ig-static-row{display:flex;gap:16px;flex-wrap:wrap;}

.photo-carousel{overflow:hidden;position:relative;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent);
  mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent);}
.photo-track{display:flex;gap:16px;width:max-content;animation:ig-scroll 30s linear infinite;}
.photo-carousel:hover .photo-track{animation-play-state:paused;}
.photo-slide{position:relative;width:260px;flex:0 0 auto;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);aspect-ratio:4/5;}
.photo-slide img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-slide span{position:absolute;left:0;right:0;bottom:0;padding:12px;background:linear-gradient(0deg,rgba(7,26,51,.85),transparent);color:#fff;font-size:12px;font-weight:600;}
@media(max-width:720px){.photo-slide{width:210px;}}
@media(max-width:720px){.ig-card{width:270px;}}

/* ---------------- CONTACT (extra) ---------------- */
.contact-box-text{max-width:560px;}
.contact-btns .ig-svg{vertical-align:-2px;}
</style>
</head>

<script>
/* ============ DATA + UTIL ============ */
const DATA = window.__DATA__;
const CAT_ORDER = ["MIRIM 1","MIRIM 2","PETIZ 1","PETIZ 2","INFANTIL 1","INFANTIL 2","JUVENIL 1","JUVENIL 2","JUNIOR 1","JUNIOR 2","SENIOR"];
function catRank(c){ const i = CAT_ORDER.indexOf((c||"").toUpperCase()); return i<0?999:i; }
function fmtCat(c){ return (c||'').replace(/\b\w/g,m=>m.toUpperCase()); }
function fmt(v){ return (v===null||v===undefined||v===''||(typeof v==='number'&&Number.isNaN(v))) ? '—' : v; }
function uniqueSorted(arr){ return [...new Set(arr)].sort(); }
function timeToSec(t){ const p = String(t).split(':'); if(p.length===3){ return parseInt(p[0],10)*3600 + parseInt(p[1],10)*60 + parseFloat(p[2]); } return parseInt(p[0],10)*60 + parseFloat(p[1]); }
function secToTime(sec){ const m = Math.floor(sec/60); const s = sec - m*60; return String(m).padStart(2,'0')+':'+s.toFixed(2).padStart(5,'0'); }
function anoOf(dataStr){ return dataStr.split('/')[2]; }
function slugify(s){ return s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
function initials(name){ return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function norm(s){ return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); }

/* ---- Generic sortable-table helpers ---- */
function parseDateBR(str){
  if(!str) return 0;
  const first = String(str).split(/[ ,]/)[0];
  const [d,m,y] = first.split('/');
  const t = new Date(`${y}-${m}-${d}`).getTime();
  return isNaN(t) ? 0 : t;
}
function placeToNum(p){
  const n = parseInt(String(p||'').replace(/[^\d]/g,''),10);
  return isNaN(n) ? 999 : n;
}
function cmp(va, vb, dir){
  if(typeof va === 'string') va = va.toLowerCase();
  if(typeof vb === 'string') vb = vb.toLowerCase();
  if(va < vb) return dir === 'asc' ? -1 : 1;
  if(va > vb) return dir === 'asc' ? 1 : -1;
  return 0;
}
function wireSortableHeaders(theadEl, state, onChange){
  theadEl.querySelectorAll('th[data-key]').forEach(th=>{
    th.classList.add('sortable-th');
    th.onclick = ()=>{
      const key = th.dataset.key;
      if(state.key === key){ state.dir = state.dir === 'asc' ? 'desc' : 'asc'; }
      else { state.key = key; state.dir = th.dataset.dir || 'asc'; }
      onChange();
    };
  });
  updateSortIndicators(theadEl, state);
}
function updateSortIndicators(theadEl, state){
  theadEl.querySelectorAll('th[data-key]').forEach(th=>{
    th.classList.remove('sort-asc','sort-desc');
    if(th.dataset.key === state.key) th.classList.add(state.dir === 'asc' ? 'sort-asc' : 'sort-desc');
  });
}


const ATHLETE_BY_NAME = {};
DATA.atletas.forEach(a=>{ ATHLETE_BY_NAME[a.nome] = a; a.slug = slugify(a.nome); });
const SLUG_TO_NAME = {};
DATA.atletas.forEach(a=>{ SLUG_TO_NAME[a.slug] = a.nome; });

function displayName(name){ const m = ATHLETE_BY_NAME[name]; if(m && m.idade < 18){ const first = name.split(' ')[0]; return first; } return name; }

function athleteRows(name){ return DATA.resultados.filter(r=>r.atleta===name); }
function athleteMedals(name){
  const rows = athleteRows(name);
  return {
    ouro: rows.filter(r=>r.colocacao==='1º').length,
    prata: rows.filter(r=>r.colocacao==='2º').length,
    bronze: rows.filter(r=>r.colocacao==='3º').length,
  };
}
function athleteBest(name){ return DATA.melhores.filter(m=>m.atleta===name); }
function athleteSpecialties(name){
  const rows = athleteRows(name);
  const byStyle = {};
  rows.forEach(r=>{ byStyle[r.estilo] = (byStyle[r.estilo]||0)+1; });
  return Object.entries(byStyle).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
}
function allCompeticoes(){ return uniqueSorted(DATA.resultados.map(r=>r.competicao)); }
function allAnos(){ return uniqueSorted(DATA.resultados.map(r=>anoOf(r.data))); }
function allCidades(){ return uniqueSorted(DATA.resultados.map(r=>r.cidade)); }

/* internal team ranking for a given event/filters -> sorted array of {atleta, tempo, tempoSec, competicao, data, it, categoria} (best time per athlete) */
function teamRanking(f){
  f = f || {};
  let rows = DATA.resultados.filter(r=>{
    if(f.categoria && r.categoria !== f.categoria) return false;
    if(f.sexo && r.sexo !== f.sexo) return false;
    if(f.estilo && r.estilo !== f.estilo) return false;
    if(f.distancia && String(r.distancia) !== String(f.distancia)) return false;
    if(f.ano && anoOf(r.data) !== f.ano) return false;
    if(f.piscina && String(r.piscina) !== String(f.piscina)) return false;
    return true;
  });
  const byAthlete = {};
  rows.forEach(r=>{
    const sec = timeToSec(r.tempo);
    if(!byAthlete[r.atleta] || sec < byAthlete[r.atleta].sec){
      byAthlete[r.atleta] = {atleta:r.atleta, tempo:r.tempo, sec, competicao:r.competicao, data:r.data, it:r.it, categoria:r.categoria, recorde:r.recorde};
    }
  });
  return Object.values(byAthlete).sort((a,b)=>a.sec-b.sec);
}

function teamStats(){
  const rows = DATA.resultados;
  const ouro = rows.filter(r=>r.colocacao==='1º').length;
  const prata = rows.filter(r=>r.colocacao==='2º').length;
  const bronze = rows.filter(r=>r.colocacao==='3º').length;
  const byAthleteCount = {};
  rows.forEach(r=>{ byAthleteCount[r.atleta] = (byAthleteCount[r.atleta]||0)+1; });
  const maisAtivo = Object.entries(byAthleteCount).sort((a,b)=>b[1]-a[1])[0];
  const melhorIT = [...rows].sort((a,b)=>b.it-a.it)[0];
  return {
    totalAtletas: DATA.atletas.length,
    totalProvas: rows.length,
    ouro, prata, bronze,
    totalMedalhas: ouro+prata+bronze,
    maisAtivo: maisAtivo ? {nome:maisAtivo[0], n:maisAtivo[1]} : null,
    melhorIT: melhorIT,
    competicoes: allCompeticoes().length,
    recordes: rows.filter(r=>r.recorde).length,
  };
}

/* records: best-ever team time per (distancia,estilo,sexo) from DATA.melhores, flag official record if any row has recorde */
function teamRecords(){
  // Sourced from ALL resultados (not just current personal-best table) so a record
  // stays listed even if a later, non-record-flagged swim was faster.
  return DATA.resultados.filter(r=>r.recorde)
    .sort((a,b)=> catRank(a.categoria)-catRank(b.categoria) || a.distancia-b.distancia || a.estilo.localeCompare(b.estilo));
}

/* ============ ROUTER ============ */
const routes = {};
function route(path, fn){ routes[path] = fn; }
function currentHash(){ return location.hash.slice(1) || '/'; }
function navigate(){
  const hash = currentHash();
  const parts = hash.split('/').filter(Boolean);
  document.querySelectorAll('.navlink').forEach(a=>a.classList.toggle('active', a.dataset.route === '/'+(parts[0]||'')));
  window.scrollTo({top:0});
  const app = document.getElementById('app');
  if(parts[0] === 'atleta' && parts[1]){
    app.innerHTML = viewAtletaDetail(parts[1]);
    initAtletaDetailCharts(parts[1]);
    initAtletaHistSort(parts[1]);
    return;
  }
  const key = '/'+(parts[0]||'');
  const viewFn = routes[key] || routes['/'];
  app.innerHTML = viewFn();
  if(key === '/') initHomeCharts();
  if(key === '/atletas') initAtletasView();
  if(key === '/ranking') initRankingView();
  if(key === '/resultados') initResultadosView();
  if(key === '/recordes') initRecordesView();
  if(key === '/contato') initContatoView();
}
window.addEventListener('hashchange', navigate);

/* ============ SHARED SNIPPETS ============ */
function chip(text, cls){ return `<span class="mini-chip ${cls||''}">${text}</span>`; }
function medalRow(m){ return `🥇 <b>${m.ouro}</b> &nbsp; 🥈 <b>${m.prata}</b> &nbsp; 🥉 <b>${m.bronze}</b>`; }
function igIcon(){ return '<svg class="ig-svg" viewBox="0 0 24 24" width="15" height="15" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:-3px"><rect x="2" y="2" width="20" height="20" rx="6" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="2"/><circle cx="17.4" cy="6.6" r="1.2" fill="currentColor"/></svg>'; }
function styleHighlights(){
  const ESTILOS = ['Livre','Costas','Peito','Borboleta','Medley'];
  return ESTILOS.map(estilo=>{
    const rows = DATA.resultados.filter(r=>r.estilo===estilo);
    if(!rows.length) return null;
    const byDist = {};
    rows.forEach(r=>{ (byDist[r.distancia] = byDist[r.distancia] || new Set()).add(r.atleta); });
    let bestDist = null, bestCount = -1;
    Object.keys(byDist).map(Number).sort((a,b)=>a-b).forEach(d=>{
      const c = byDist[d].size;
      if(c > bestCount){ bestCount = c; bestDist = d; }
    });
    const evRows = rows.filter(r=>r.distancia===bestDist);
    const byAthlete = {};
    evRows.forEach(r=>{
      const sec = timeToSec(r.tempo);
      if(!byAthlete[r.atleta] || sec < byAthlete[r.atleta].sec){ byAthlete[r.atleta] = Object.assign({}, r, {sec}); }
    });
    let ranked = Object.values(byAthlete).sort((a,b)=>a.sec-b.sec);
    const n = ranked.length >= 5 ? 5 : Math.min(ranked.length, 3);
    ranked = ranked.slice(0, n);
    return { estilo, distancia: bestDist, ranked };
  }).filter(Boolean);
}
function placeCell(place){
  const n = parseInt(place,10);
  const cls = n===1?'p1':n===2?'p2':n===3?'p3':'';
  return `<span class="pos-num ${cls}">${n||'-'}</span>`;
}

function initHomeCharts(){
  const rows = DATA.resultados;
  const ouro = rows.filter(r=>r.colocacao==='1º').length;
  const prata = rows.filter(r=>r.colocacao==='2º').length;
  const bronze = rows.filter(r=>r.colocacao==='3º').length;
  const outros = rows.length - ouro - prata - bronze;
  const css = getComputedStyle(document.documentElement);
  const navy = css.getPropertyValue('--navy').trim();
  const turq = css.getPropertyValue('--turq').trim();
  const muted = css.getPropertyValue('--muted').trim();
  const gray = css.getPropertyValue('--gray-mid').trim();
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const tickColor = isDark ? '#AEBFD1' : muted;
  const gridColor = isDark ? 'rgba(255,255,255,.10)' : 'rgba(15,27,45,.06)';
  const catBarColor = isDark ? '#5B9BFF' : navy;

  new Chart(document.getElementById('chart-medals'), {
    type:'doughnut',
    data:{ labels:['Ouro','Prata','Bronze','Sem pódio'], datasets:[{data:[ouro,prata,bronze,outros],
      backgroundColor:['#D4A017','#9AA5B1','#B5651D', gray]}]},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11},color:tickColor}}}}
  });

  const byStyle = {};
  rows.forEach(r=>{ byStyle[r.estilo]=(byStyle[r.estilo]||0)+1; });
  new Chart(document.getElementById('chart-styles'), {
    type:'bar',
    data:{labels:Object.keys(byStyle), datasets:[{data:Object.values(byStyle), backgroundColor:turq, borderRadius:6}]},
    options:{plugins:{legend:{display:false}}, scales:{
      y:{beginAtZero:true,ticks:{precision:0,color:tickColor},grid:{color:gridColor}},
      x:{ticks:{color:tickColor},grid:{display:false}}
    }}
  });

  const byCat = {};
  DATA.atletas.forEach(a=>{ byCat[fmtCat(a.categoria)]=(byCat[fmtCat(a.categoria)]||0)+1; });
  new Chart(document.getElementById('chart-cats'), {
    type:'bar',
    data:{labels:Object.keys(byCat), datasets:[{data:Object.values(byCat), backgroundColor:catBarColor, borderRadius:6}]},
    options:{indexAxis:'y', plugins:{legend:{display:false}}, scales:{
      x:{beginAtZero:true,ticks:{precision:0,color:tickColor},grid:{color:gridColor}},
      y:{ticks:{color:tickColor},grid:{display:false}}
    }}
  });
}

let activeAthlete = null;
function initAtletasView(){
  activeAthlete = null;
  const atlSortState = {key:'atleta', dir:'asc'};
  const atlAccessor = (r,key)=>{
    switch(key){
      case 'atleta': return r.atleta||'';
      case 'prova': return r.distancia*1000 + (r.estilo||'').charCodeAt(0);
      case 'categoria': return catRank(r.categoria);
      case 'tempo': return timeToSec(r.tempo);
      case 'colocacao': return placeToNum(r.colocacao);
      case 'data': return parseDateBR(r.data);
      case 'competicao': return r.competicao||'';
      case 'it': return parseFloat(r.it)||0;
      default: return '';
    }
  };
  const render = ()=>{
    const f = {
      nome: document.getElementById('f-nome').value.trim().toLowerCase(),
      categoria: document.getElementById('f-categoria').value,
      sexo: document.getElementById('f-sexo').value,
      estilo: document.getElementById('f-estilo').value,
      distancia: document.getElementById('f-distancia').value,
      ano: document.getElementById('f-ano').value,
      cidade: document.getElementById('f-cidade').value,
      competicao: document.getElementById('f-competicao').value,
      soRecorde: document.getElementById('f-recorde').checked,
    };
    const filtered = DATA.resultados.filter(r=>{
      if(f.nome && !r.atleta.toLowerCase().includes(f.nome)) return false;
      if(f.categoria && r.categoria !== f.categoria) return false;
      if(f.sexo && r.sexo !== f.sexo) return false;
      if(f.estilo && r.estilo !== f.estilo) return false;
      if(f.distancia && String(r.distancia) !== String(f.distancia)) return false;
      if(f.ano && anoOf(r.data) !== f.ano) return false;
      if(f.cidade && r.cidade !== f.cidade) return false;
      if(f.competicao && r.competicao !== f.competicao) return false;
      if(f.soRecorde && !r.recorde) return false;
      return true;
    });
    const athleteNames = [...new Set(filtered.map(r=>r.atleta))];
    const cardsEl = document.getElementById('cards');
    cardsEl.innerHTML = '';
    if(athleteNames.length===0){ cardsEl.innerHTML = '<div class="emptystate">Nenhum atleta encontrado com esses filtros.</div>'; }
    const athletesInfo = athleteNames.map(name=>{
      const rows = DATA.resultados.filter(r=>r.atleta===name);
      const filteredRows = filtered.filter(r=>r.atleta===name);
      const meta = ATHLETE_BY_NAME[name] || rows[0];
      const m = athleteMedals(name);
      return {name, meta, filteredRows, ...m};
    }).sort((a,b)=> catRank(a.meta.categoria)-catRank(b.meta.categoria) || a.name.localeCompare(b.name));

    athletesInfo.forEach(info=>{
      const card = document.createElement('div');
      card.className = 'acard' + (activeAthlete===info.name ? ' active':'');
      const chips = info.filteredRows.slice(0,4).map(r=>
        `<span class="eventchip ${r.recorde?'rec':''}">${r.distancia}m ${r.estilo} · ${r.tempo}${r.recorde?' 🏅':''}</span>`).join('');
      card.innerHTML = `
        <div class="acard-top">
          <div class="avatar"><span>${initials(displayName(info.name))}</span></div>
          <div><div class="acard-name">${displayName(info.name)}</div><div class="acard-meta">${fmtCat(info.meta.categoria)} · ${info.meta.sexo==='F'?'Feminino':'Masculino'}</div></div>

function styleTimeSeries(name, estilo){
  const rows = athleteRows(name).filter(r=>r.estilo===estilo);
  if(!rows.length) return {distancia:null, rows:[]};
  const byDist = {};
  rows.forEach(r=>{ (byDist[r.distancia] = byDist[r.distancia] || []).push(r); });
  let bestDist = null, bestCount = -1;
  Object.keys(byDist).map(Number).sort((a,b)=>a-b).forEach(d=>{
    const c = byDist[d].length;
    if(c > bestCount){ bestCount = c; bestDist = d; }
  });
  const evRows = byDist[bestDist].slice().sort((a,b)=>parseDateBR(a.data)-parseDateBR(b.data));
  return {distancia:bestDist, rows:evRows};
}

let evoChartInstance = null;
function initAtletaDetailCharts(slug){
  const name = SLUG_TO_NAME[slug];
  if(!name) return;
  const ESTILOS = ['Livre','Costas','Peito','Borboleta','Medley'];
  const rows = athleteRows(name);
  const disponiveis = ESTILOS.filter(e=>rows.some(r=>r.estilo===e));
  if(!disponiveis.length) return;

  const counts = {};
  disponiveis.forEach(e=>{ counts[e] = rows.filter(r=>r.estilo===e).length; });
  let estiloAtivo = disponiveis.slice().sort((a,b)=>counts[b]-counts[a])[0];

  const tabsEl = document.getElementById('evo-style-tabs');
  const subEl = document.getElementById('evo-sub');
  const canvas = document.getElementById('chart-evolucao');
  if(!canvas) return;

  function renderTabs(){
    if(!tabsEl) return;
    tabsEl.innerHTML = disponiveis.map(e=>
      `<button type="button" class="evo-tab${e===estiloAtivo?' active':''}" data-estilo="${e}">${e}</button>`
    ).join('');
    tabsEl.querySelectorAll('.evo-tab').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        estiloAtivo = btn.getAttribute('data-estilo');
        renderTabs();
        renderChart();
      });
    });
  }

  function renderChart(){
    const { distancia, rows: evRows } = styleTimeSeries(name, estiloAtivo);
    if(subEl) subEl.textContent = distancia ? `${distancia}m ${estiloAtivo} — evolução cronológica` : '';

    const css = getComputedStyle(document.documentElement);
    const turq = css.getPropertyValue('--turq').trim();
    const muted = css.getPropertyValue('--muted').trim();
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const tickColor = isDark ? '#AEBFD1' : muted;
    const gridColor = isDark ? 'rgba(255,255,255,.16)' : 'rgba(15,27,45,.10)';
    const shortDate = (d)=>{ const p = d.split('/'); return p.length===3 ? `${p[0]}/${p[1]}/${p[2].slice(2)}` : d; };

    const secsArr = evRows.map(r=>timeToSec(r.tempo));
    const minSecRaw = Math.min(...secsArr), maxSecRaw = Math.max(...secsArr);
    const range = maxSecRaw - minSecRaw;
    let stepSize = 1;
    if(range > 120) stepSize = 30;
    else if(range > 60) stepSize = 10;
    else if(range > 20) stepSize = 5;
    else if(range > 8) stepSize = 2;
    const yMin = Math.floor(minSecRaw / stepSize) * stepSize;
    const yMax = Math.ceil(maxSecRaw / stepSize) * stepSize;
    const secToTimeWhole = (v)=>{ const s = Math.round(v); const m = Math.floor(s/60); const sec = s - m*60; return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); };

    if(evoChartInstance){ evoChartInstance.destroy(); evoChartInstance = null; }
    evoChartInstance = new Chart(canvas, {
      type:'line',
      data:{ labels: evRows.map(r=>shortDate(r.data)),
        datasets:[{label:'Tempo', data: evRows.map(r=>timeToSec(r.tempo)), borderColor:turq, backgroundColor:turq+'33',
          tension:.3, fill:true, pointRadius:4, pointHoverRadius:6, pointBackgroundColor:turq }]},
      options:{ layout:{padding:{top:6,right:6}},
        plugins:{ legend:{display:false},
          tooltip:{ callbacks:{
            title:(items)=>{ const r = evRows[items[0].dataIndex]; return `${r.data} — ${r.competicao}`; },
            label:(ctx)=>`Tempo: ${secToTime(ctx.parsed.y)}` } } },
        scales:{
          x:{ ticks:{font:{size:10.5}, maxRotation:0, minRotation:0, autoSkip:true, maxTicksLimit:6, color:tickColor}, grid:{display:false} },
          y:{ beginAtZero:false, min:yMin, max:yMax, ticks:{ stepSize, color:tickColor, callback:(v)=>secToTimeWhole(v) }, grid:{color:gridColor} }
        } }
    });
  }

  renderTabs();
  renderChart();
}

      return true;
    });
    rows = rows.slice().sort((a,b)=>cmp(accessor(a,sortState.key), accessor(b,sortState.key), sortState.dir));
    document.getElementById('rs-count').textContent = `${rows.length} resultado${rows.length===1?'':'s'} encontrado${rows.length===1?'':'s'}`;
    document.getElementById('rs-tbody').innerHTML = rows.map(r=>`<tr class="${r.recorde?'record':''}">
      <td>${r.data}</td><td>${r.competicao}</td><td>${r.cidade||'—'}</td>
      <td><a class="rowlink" href="#/atleta/${ATHLETE_BY_NAME[r.atleta]?ATHLETE_BY_NAME[r.atleta].slug:slugify(r.atleta)}">${displayName(r.atleta)}</a></td>
      <td>${fmtCat(r.categoria)}</td><td>${r.distancia}m ${r.estilo}</td>
      <td><b>${r.tempo}</b>${r.recorde?`<span class="badge-rec" style="margin-left:6px">${r.recorde}</span>`:''}</td>
      <td>${placeCell(r.colocacao)}</td><td>${fmt(r.pontos)}</td><td>${fmt(r.it)}</td></tr>`).join('')
      || `<tr><td colspan="10" style="text-align:center;color:var(--muted);padding:30px;">Nenhum resultado encontrado.</td></tr>`;
    updateSortIndicators(document.getElementById('rs-thead'), sortState);
  };
  wireSortableHeaders(document.getElementById('rs-thead'), sortState, render);
  ['rs-busca'].forEach(id=>document.getElementById(id).addEventListener('input', render));
  ['rs-ano','rs-categoria','rs-recorde'].forEach(id=>document.getElementById(id).addEventListener('change', render));
  render();
}

/* ============ VIEW: COMPETIÇÕES ============ */
route('/competicoes', viewCompeticoes);
function viewCompeticoes(){
  const byComp = {};
  DATA.resultados.forEach(r=>{
    const key = r.competicao;
    if(!byComp[key]) byComp[key] = { nome:r.competicao, cidade:r.cidade, data:r.data, atletas:new Set(), provas:0, medalhas:0 };
    byComp[key].atletas.add(r.atleta);
    byComp[key].provas++;
    if(r.colocacao === '1º' || r.colocacao === 1) byComp[key].medalhas++;
  });
  const comps = Object.values(byComp).sort((a,b)=>{
    const [d1,m1,y1]=a.data.split('/'); const [d2,m2,y2]=b.data.split('/');
    return new Date(`${y2}-${m2}-${d2}`) - new Date(`${y1}-${m1}-${d1}`);
  });
  return `
  <div class="wrap">
    <div class="pagehead"><h1>Competições</h1><p>Eventos em que a equipe DM Natação esteve presente.</p></div>
    <div class="gridcols2">
      ${comps.map(c=>`
      <div class="card comp-card">
        <div class="comp-head">
          <h3>${c.nome}</h3>
          <span class="pill">${c.data}</span>
        </div>
        <div class="comp-meta">
          <span>📍 ${c.cidade||'Palmas/TO'}</span>
          <span>🏊 ${c.atletas.size} atletas</span>
          <span>📋 ${c.provas} provas</span>
          <span>🥇 ${c.medalhas} ouros</span>
        </div>
      </div>`).join('')}
    </div>
    <div class="section-title"><span class="bar"></span>Próximas competições</div>
    ${proximasCompeticoesHTML()}
    <footer>DM Natação — Palmas/TO</footer>
  </div>`;
}

    <div class="filterbar">
      <div class="row">
        <div class="field"><label>Categoria</label><select id="rec-categoria"><option value="">Todas</option>${categorias.map(c=>`<option value="${c}">${fmtCat(c)}</option>`).join('')}</select></div>
        <div class="field"><label>Sexo</label><select id="rec-sexo"><option value="">Todos</option><option value="F">Feminino</option><option value="M">Masculino</option></select></div>
        <div class="field"><label>Estilo</label><select id="rec-estilo"><option value="">Todos</option>${uniqueSorted(recs.map(r=>r.estilo)).map(e=>`<option value="${e}">${e}</option>`).join('')}</select></div>
      </div>
    </div>
    <div class="sortctl">
      <label>Ordenar por</label>
      <select id="rec-sortkey">
        <option value="categoria">Categoria</option>
        <option value="estilo">Estilo</option>
        <option value="tempo">Tempo</option>
        <option value="data">Data</option>
        <option value="atleta">Atleta</option>
      </select>
      <button id="rec-sortdir" type="button" title="Inverter ordem">↑ Crescente</button>
    </div>
    <div class="cards" id="rec-cards"></div>
    <footer>DM Natação — Palmas/TO</footer>
  </div>`;
}
function initRecordesView(){
  const recs = teamRecords();
  const sortState = {key:'categoria', dir:'asc'};
  const accessor = (r,key)=>{
    switch(key){
      case 'categoria': return catRank(r.categoria);
      case 'estilo': return r.estilo||'';
      case 'tempo': return timeToSec(r.tempo);
      case 'data': return parseDateBR(r.data);
      case 'atleta': return r.atleta||'';
      default: return '';
    }
  };
  const render = ()=>{
    const categoria = document.getElementById('rec-categoria').value;
    const sexo = document.getElementById('rec-sexo').value;
    const estilo = document.getElementById('rec-estilo').value;
    let filtered = recs.filter(r=> (!categoria||r.categoria===categoria) && (!sexo||r.sexo===sexo) && (!estilo||r.estilo===estilo));
    filtered = filtered.slice().sort((a,b)=>cmp(accessor(a,sortState.key), accessor(b,sortState.key), sortState.dir));
    document.getElementById('rec-cards').innerHTML = filtered.map(r=>`
      <div class="acard record-card">
        <div class="rc-badge">${r.recorde}</div>
        <h3>${r.distancia}m ${r.estilo}</h3>
        <div class="rc-time">${r.tempo}</div>
        <div class="rc-athlete"><a class="rowlink" href="#/atleta/${ATHLETE_BY_NAME[r.atleta]?ATHLETE_BY_NAME[r.atleta].slug:slugify(r.atleta)}">${displayName(r.atleta)}</a></div>
        <div class="rc-meta">${fmtCat(r.categoria)} · ${r.sexo==='F'?'Feminino':'Masculino'}</div>
        <div class="rc-meta">${r.competicao} · ${r.data} · ${r.cidade||'Palmas/TO'}</div>
      </div>`).join('') || `<div class="empty-state"><p>Nenhum recorde encontrado com esses filtros.</p></div>`;
  };
  ['rec-categoria','rec-sexo','rec-estilo'].forEach(id=>document.getElementById(id).addEventListener('change', render));
  document.getElementById('rec-sortkey').addEventListener('change', (e)=>{ sortState.key = e.target.value; render(); });
  document.getElementById('rec-sortdir').addEventListener('click', ()=>{
    sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
    document.getElementById('rec-sortdir').textContent = sortState.dir === 'asc' ? '↑ Crescente' : '↓ Decrescente';
    render();
  });
  render();
}

<script>
/* Theme toggle */
(function(){
  const root = document.documentElement;
  const btn = document.getElementById('theme-toggle');
  function applyIcon(){ btn.textContent = root.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙'; }
  btn.addEventListener('click', function(){
    const cur = root.getAttribute('data-theme');
    root.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
    applyIcon();
    if(location.hash.slice(1).startsWith('/atleta/') || currentHash()==='/'){
      /* re-render to refresh chart colors */
      navigate();
    }
  });
  applyIcon();
})();
/* Mobile nav burger */
(function(){
  const burger = document.getElementById('nav-burger');
  const links = document.getElementById('navlinks');
  burger.addEventListener('click', function(){ links.classList.toggle('open'); });
  links.addEventListener('click', function(e){ if(e.target.classList.contains('navlink')) links.classList.remove('open'); });
})();
/* Boot */
navigate();
</script>
